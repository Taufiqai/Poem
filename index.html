<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আদ্যন্ত — কাব্য-দর্শন</title>
<style>
  :root{
    --gold:#e3c97f; --gold-deep:#c9a14a;
    --paper:#f4ecd8; --rose:#d98a8a;
    --river:#4a7bb0; --leaf:#7ba36a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:"Tiro Bangla","Noto Serif Bengali",serif;
    background:#0a0e1f; color:var(--paper);
    -webkit-font-smoothing:antialiased;
  }

  /* layered ethereal sky */
  #sky{position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(1100px 700px at 50% -15%, #3a2b5e 0%, transparent 55%),
      radial-gradient(900px 600px at 18% 12%, #5b3b6e44 0%, transparent 60%),
      radial-gradient(900px 600px at 85% 8%, #2a4a7a55 0%, transparent 60%),
      linear-gradient(180deg,#141033 0%, #1d1a44 32%, #24315e 62%, #2c4a72 100%);
  }
  /* subtle star/dust shimmer */
  #dust{position:fixed;inset:0;z-index:1;pointer-events:none;}
  /* synthetic intergalactic background — drifting stars, nebulae, slow galaxy */
  #cosmos{position:fixed;inset:0;z-index:1;pointer-events:none;}
  #motifCanvas{position:fixed;inset:0;z-index:2;pointer-events:none;}
  #river{position:fixed;left:0;right:0;bottom:0;height:34vh;z-index:2;pointer-events:none;}

  /* river-painting mosaic: five meaningful regions that assemble across the poem */
  #mosaic{position:fixed;inset:0;z-index:3;pointer-events:none;}
  .frag{position:absolute;inset:0;width:100%;height:100%;
    background-image:var(--riverbg);
    background-size:cover;background-position:center;
    opacity:0;transition:opacity 3.4s ease, filter 3.4s ease;
    filter:saturate(.85) brightness(.9);
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;}
  .frag.in{opacity:.92;}
  /* a soft darkening so the poem text stays readable on top of the assembled image */
  #mosaicVeil{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:0;
    transition:opacity 3s ease;
    background:radial-gradient(120% 90% at 50% 50%, rgba(10,14,31,.18) 0%, rgba(10,14,31,.55) 100%);}
  #mosaicVeil.in{opacity:1;}

  /* aura behind text */
  .stage{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:6vh 7vw;}

  #poemLine{
    font-size:clamp(38px,8vw,96px);line-height:1.45;font-weight:700;
    max-width:15em;
    color:#0a0a0a;
    text-shadow:
      0 0 18px rgba(243,236,216,.95),
      0 0 36px rgba(227,201,127,.85),
      0 0 60px rgba(227,201,127,.6),
      0 0 90px rgba(227,201,127,.4);
    opacity:0;transform:translateY(14px);
    transition:opacity 1.6s ease, transform 1.6s ease;
    min-height:2.4em;
  }
  #poemLine.show{opacity:1;transform:translateY(0);}
  #poemLine.prose{font-size:clamp(30px,6vw,68px);max-width:18em;line-height:1.55;font-style:italic;font-weight:600;}

  #sectionTag{
    font-size:clamp(11px,1.6vw,14px);letter-spacing:.34em;text-transform:uppercase;
    color:var(--gold-deep);opacity:0;transition:opacity 1.4s ease;margin-bottom:3.4vh;font-family:"Hind Siliguri",sans-serif;
  }
  #sectionTag.show{opacity:.8;}

  /* title overlay */
  #title{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%,#1d1a44 0%,#0a0e1f 80%);
    transition:opacity 2s ease;text-align:center;}
  #title h1{
    font-size:clamp(56px,13vw,140px);font-weight:700;letter-spacing:.04em;
    background:linear-gradient(180deg,#fff 0%, var(--gold) 120%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 60px rgba(227,201,127,.35);
  }
  #title .by{margin-top:2vh;font-size:clamp(14px,2.4vw,22px);color:var(--paper);opacity:.85;font-family:"Hind Siliguri",sans-serif;font-weight:300;letter-spacing:.1em;}
  #title .rule{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:3vh 0;}
  #startBtn{
    margin-top:5vh;font-family:"Hind Siliguri",sans-serif;font-size:16px;font-weight:600;
    color:#1a1206;cursor:pointer;border:none;border-radius:999px;padding:15px 38px;letter-spacing:.05em;
    background:linear-gradient(180deg,var(--gold) 0%, var(--gold-deep) 100%);
    box-shadow:0 12px 40px -12px rgba(227,201,127,.7);transition:transform .2s;
  }
  #startBtn:hover{transform:translateY(-2px);}
  #title .hint{margin-top:2.4vh;font-size:12px;color:#9fb0c8;font-family:"Hind Siliguri",sans-serif;}

  /* painting overlay — shown 4 times at intervals */
  #painting{position:fixed;inset:0;z-index:12;display:flex;align-items:center;justify-content:center;
    background:#0a0e1f;opacity:0;pointer-events:none;transition:opacity 2.2s ease;}
  #painting.show{opacity:1;}
  #painting img{width:100%;height:100%;object-fit:cover;
    transform:scale(1.02);transition:transform 9s ease;}
  #painting.show img{transform:scale(1.1);}
  #painting::after{content:"";position:absolute;inset:0;
    box-shadow:inset 0 0 220px 60px rgba(10,14,31,0.85);pointer-events:none;}

  /* river-scene overlay — shown at poem start, at final line, and held 1 minute after the poem ends */
  #riverScene{position:fixed;inset:0;z-index:25;display:flex;align-items:center;justify-content:center;
    background:#0a0e1f;opacity:0;pointer-events:none;transition:opacity 2.4s ease;}
  #riverScene.show{opacity:1;}
  #riverScene img{width:100%;height:100%;object-fit:cover;
    transform:scale(1.02);transition:transform 22s ease;}
  #riverScene.show img{transform:scale(1.12);}
  #riverScene::after{content:"";position:absolute;inset:0;
    box-shadow:inset 0 0 200px 50px rgba(10,14,31,0.55);pointer-events:none;}
  /* title shown over the river scene at start: big black ink with golden border */
  #riverTitle{position:absolute;z-index:2;text-align:center;
    font-family:"Tiro Bangla","Hind Siliguri",serif;font-weight:700;
    font-size:clamp(60px,15vw,170px);letter-spacing:.03em;
    color:#0a0a0a;
    padding:.08em .35em;border-radius:16px;
    border:4px solid var(--gold);
    background:rgba(244,236,216,.32);
    box-shadow:0 0 50px rgba(227,201,127,.7), inset 0 0 30px rgba(244,236,216,.6);
    text-shadow:0 0 14px rgba(244,236,216,.9), 0 0 28px rgba(227,201,127,.7);
    opacity:0;transform:scale(.94);transition:opacity 1.8s ease, transform 1.8s ease;}
  #riverTitle.show{opacity:1;transform:scale(1);}
  /* final poem line shown over the river scene: black ink */
  #riverEndLine{position:absolute;z-index:2;text-align:center;
    font-family:"Tiro Bangla","Hind Siliguri",serif;font-weight:700;
    font-size:clamp(32px,6.5vw,72px);line-height:1.4;max-width:16em;padding:0 1em;
    color:#0a0a0a;
    text-shadow:0 0 16px rgba(244,236,216,.95), 0 0 34px rgba(244,236,216,.7);
    opacity:0;transform:translateY(14px);transition:opacity 1.8s ease, transform 1.8s ease;}
  #riverEndLine.show{opacity:1;transform:translateY(0);}

  /* controls — compact corner panel, bottom-right */
  #controls{position:fixed;bottom:12px;right:12px;left:auto;transform:none;z-index:30;
    display:flex;gap:4px;align-items:center;background:rgba(13,16,35,.5);
    backdrop-filter:blur(10px);border:1px solid rgba(227,201,127,.2);
    border-radius:14px;padding:5px 6px;opacity:0;transition:opacity 1s;font-family:"Hind Siliguri",sans-serif;
    font-size:0;}
  #controls.show{opacity:.55;}
  #controls:hover{opacity:1;}
  .ctrl{background:none;border:none;color:var(--paper);cursor:pointer;font-size:13px;
    padding:5px 8px;border-radius:8px;transition:background .2s;font-family:inherit;line-height:1;}
  .ctrl:hover{background:rgba(227,201,127,.18);}
  .ctrl.gold{color:var(--gold);}
  /* extra controls hide by default; reveal on hover or when panel toggled open */
  #controls .extra{display:none;align-items:center;gap:4px;}
  #controls.open .extra{display:flex;}
  #vol{width:62px;accent-color:var(--gold-deep);}
  #spd{width:62px;accent-color:var(--gold);}
  #fspd{width:62px;accent-color:var(--gold-deep);}
  .spd-ico{font-size:11px;opacity:.7;padding:0 1px;cursor:default;}
  .sep{width:1px;height:16px;background:rgba(227,201,127,.22);}
  #ragaTag{font-size:9.5px;color:var(--gold-deep);letter-spacing:.08em;padding:0 4px;white-space:nowrap;}
  #gear{font-size:13px;}

  /* progress dots */
  #dots{position:fixed;bottom:14px;left:14px;top:auto;transform:none;z-index:30;display:flex;gap:6px;opacity:0;transition:opacity 1s;}
  #dots.show{opacity:.5;}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(244,236,216,.25);transition:all .4s;}
  .dot.on{background:var(--gold);box-shadow:0 0 10px var(--gold);transform:scale(1.3);}

  @media (max-width:600px){
    #controls{flex-wrap:wrap;justify-content:flex-end;max-width:90vw;}
    #vol{width:54px;}
    #spd{width:54px;}
    #fspd{width:54px;}
  }
</style>
</head>
<body>
  <div id="sky"></div>
  <canvas id="cosmos"></canvas>
  <canvas id="dust"></canvas>
  <canvas id="motifCanvas"></canvas>
  <svg id="river" viewBox="0 0 1440 400" preserveAspectRatio="none"></svg>

  <!-- five meaningful regions of the river painting; assemble across the poem -->
  <div id="mosaic">
    <div class="frag" data-region="sky"></div>
    <div class="frag" data-region="walker"></div>
    <div class="frag" data-region="water"></div>
    <div class="frag" data-region="creatures"></div>
    <div class="frag" data-region="birds"></div>
  </div>
  <div id="mosaicVeil"></div>

  <div id="dots"></div>

  <div class="stage">
    <div id="sectionTag"></div>
    <div id="poemLine"></div>
  </div>

  <div id="controls">
    <button class="ctrl gold" id="playPause" title="থামাও / চালাও">⏸</button>
    <button class="ctrl" id="gear" title="সেটিংস">⚙</button>
    <span class="extra">
      <div class="sep"></div>
      <button class="ctrl" id="prev" title="আগের">◀</button>
      <button class="ctrl" id="next" title="পরের">▶</button>
      <button class="ctrl" id="restart" title="শুরু থেকে">↻</button>
      <div class="sep"></div>
      <button class="ctrl" id="mute" title="মিউট">🔊</button>
      <input type="range" id="vol" min="0" max="100" value="55">
      <div class="sep"></div>
      <span class="spd-ico" title="লেখার গতি">🐢</span>
      <input type="range" id="spd" min="50" max="180" value="100" title="লেখার গতি">
      <span class="spd-ico" title="লেখার গতি">🐇</span>
      <div class="sep"></div>
      <span class="spd-ico" title="বাঁশির গতি">🎍</span>
      <input type="range" id="fspd" min="50" max="180" value="100" title="বাঁশির গতি">
      <span id="ragaTag">সেইকিলোস</span>
    </span>
  </div>

  <div id="painting"><img id="paintingImg" alt="শব্দকুড়ানী"></div>
  <div id="riverScene">
    <img id="riverImg" alt="নদীর দৃশ্য">
    <div id="riverTitle">আদ্যন্ত</div>
    <div id="riverEndLine"></div>
  </div>

  <div id="title">
    <h1>আদ্যন্ত</h1>
    <div class="rule"></div>
    <div class="by">তৌফিকুল ইসলাম সজল</div>
    <button id="startBtn">▶ শুরু করুন</button>
    <div class="hint">সেইকিলোস এপিটাফ (প্রাচীনতম সম্পূর্ণ সুর, ১ম শতক) · দিভিয়ে বাবে অস্থি-বাঁশির কণ্ঠে · হেডফোন ব্যবহার করলে অনুভূতি গভীর হবে</div>
  </div>

/* ============================================================
   IMAGE MOSAIC — five meaningful regions of the river painting.
   Each region is revealed via an elliptical CSS mask placed over
   the area of the painting it corresponds to. Regions accumulate
   as the poem moves through its sections; by the end the whole
   painting stands assembled (শুরুতেই শেষ, শেষেই শুরু).
   ============================================================ */
const REGION_MASK={
  // soft elliptical reveals positioned over the painting (x% y% / radius)
  sky:       "radial-gradient(ellipse 75% 42% at 50% 14%, #000 55%, transparent 100%)",
  walker:    "radial-gradient(ellipse 34% 40% at 27% 46%, #000 55%, transparent 100%)",
  water:     "radial-gradient(ellipse 62% 48% at 45% 78%, #000 55%, transparent 100%)",
  creatures: "radial-gradient(ellipse 34% 34% at 74% 78%, #000 55%, transparent 100%)",
  birds:     "radial-gradient(ellipse 40% 46% at 82% 26%, #000 55%, transparent 100%)",
};
const fragEls={};
document.querySelectorAll(".frag").forEach(el=>{
  const r=el.dataset.region;
  fragEls[r]=el;
  el.style.webkitMaskImage=REGION_MASK[r];
  el.style.maskImage=REGION_MASK[r];
});
// which painting region each poem section unveils
const SECTION_REGION={
  "আদি":"sky",            // মেঘ, আকাশ
  "ভাষা":"walker",        // পথিক — ভাষা ও অস্তিত্বের যাত্রী
  "শব্দকুড়ানী":"water",   // নদী-জল, শৈবাল-পদ্ম
  "পঞ্চ কারণ":"creatures",// ব্যাঙ-সাপ-মাছ (বিবর্তন)
  "মোহনা":"birds",        // পাখি-গাছ
  "আদ্যন্ত":"all",        // সম্পূর্ণ ছবি একত্রে
};
const revealed=new Set();
function revealRegion(sec){
  document.getElementById("mosaicVeil").classList.add("in");
  const r=SECTION_REGION[sec];
  if(!r) return;
  if(r==="all"){ Object.values(fragEls).forEach(e=>e.classList.add("in")); return; }
  if(fragEls[r]){ fragEls[r].classList.add("in"); revealed.add(r); }
}
function resetMosaic(){
  revealed.clear();
  Object.values(fragEls).forEach(e=>e.classList.remove("in"));
  document.getElementById("mosaicVeil").classList.remove("in");
}

/* ============================================================
   CHARACTER SHATTER — as a line dissolves, its letters break into
   particles that drift toward the horizon vanishing point and fade.
   ============================================================ */
let shards=[];
function shatterLine(){
  const el=document.getElementById("poemLine");
  const txt=el.textContent;
  if(!txt) return;
  const rect=el.getBoundingClientRect();
  const cs=getComputedStyle(el);
  const fontPx=parseFloat(cs.fontSize);
  const font=cs.fontWeight+" "+cs.fontStyle+" "+fontPx+"px "+cs.fontFamily;
  // measure to lay characters across the line's actual rendered box
  mctx.font=font;
  const totalW=mctx.measureText(txt).width;
  let x=rect.left+(rect.width-totalW)/2;     // approx start (centered text)
  const baseY=rect.top+rect.height/2+fontPx*0.34;
  const vanishX=innerWidth*0.5, vanishY=-innerHeight*0.15; // horizon above
  for(const ch of txt){
    const w=mctx.measureText(ch).width;
    if(ch!==" "){
      const cx=x+w/2;
      const ang=Math.atan2(vanishY-baseY, vanishX-cx);
      const sp=1.4+Math.random()*2.2;
      shards.push({
        ch, x:cx, y:baseY, font,
        vx:Math.cos(ang)*sp+(Math.random()-0.5)*0.8,
        vy:Math.sin(ang)*sp-(0.6+Math.random()*0.9),
        rot:0, vr:(Math.random()-0.5)*0.18,
        life:0, max:120+Math.random()*60, size:fontPx
      });
    }
    x+=w;
  }
}
function drawShards(){
  if(!shards.length) return;
  for(let i=shards.length-1;i>=0;i--){
    const s=shards[i];
    s.life++;
    s.x+=s.vx; s.y+=s.vy;
    s.vy+=0.012;            // slight pull
    s.vx*=0.992; s.vy*=0.994;
    s.rot+=s.vr;
    const p=s.life/s.max;
    const a=Math.max(0,1-p);
    const scale=1-0.65*p;
    mctx.save();
    mctx.translate(s.x,s.y);
    mctx.rotate(s.rot);
    mctx.scale(scale,scale);
    mctx.font=s.font;
    mctx.textAlign="center"; mctx.textBaseline="middle";
    mctx.shadowColor="rgba(227,201,127,"+(a*0.7)+")"; mctx.shadowBlur=14;
    mctx.fillStyle="rgba(10,10,10,"+a+")";
    mctx.fillText(s.ch,0,0);
    mctx.restore();
    if(s.life>=s.max) shards.splice(i,1);
  }
}

/* ============================================================
   AUDIO — The Seikilos Epitaph (oldest complete composition,
   1st–2nd c. CE) voiced on a Divje Babe bone-flute timbre
   (breathy, pure, slightly unstable — Paleolithic bone pipe).
   Melody set with modal final on A (Phrygian octave species).
   ============================================================ */
let actx=null, master=null, airGain=null, fluteGain=null;
let audioOn=true, muted=false, melodyTimer=null;

// Pitch reference: A3 = 220Hz as the modal final.
function hz(name){
  // semitone offsets from A3 for the notes used in the melody
  const M={ "G3":-2,"A3":0,"B3":2,"C4":3,"D4":5,"E4":7,"F4":8,"G4":10,"A4":12,"C5":15 };
  return 220*Math.pow(2,(M[name])/12);
}
/* The Seikilos melody as [note, beats] pairs, in its standard
   transcription. Four sung phrases ("While you live, shine / have
   no grief at all / life is short / time demands its toll"),
   then it loops — fitting আদ্যন্ত: the end returns to the start. */
const SEIKILOS=[
  // Line 1 — Hóson zêis, phaínou  (While you live, shine)
  ["A3",2],["C4",1],["C4",1],["C4",1],   // Ho-son zê-is
  ["B3",1],["C4",1],["D4",2],            // phai-... -nou
  // Line 2 — mēdèn hólōs sỳ lypoû  (have no grief at all)
  ["C4",1],["B3",1],["A3",1],["C4",1],   // mē-dèn hó-lōs
  ["B3",1],["A3",1],["G3",2],            // sỳ ly-poû
  // Line 3 — pròs olígon ésti tò zên  (life exists only a short while)
  ["A3",1],["C4",1],["C4",1],["D4",1],   // pròs o-lí-gon
  ["E4",2],["C4",1],["A3",1],            // és-ti tò zên
  // Line 4 — tò télos ho khrónos apaiteî  (and time demands its toll)
  ["A3",1],["C4",1],["C4",1],["E4",1],   // tò té-los ho khró-
  ["E4",1],["D4",1],["C4",1],["B3",1],   // -nos a-pai-
  ["A3",4],                              // -teî  (final, held long)
];
const BEAT_BASE=0.82; // base seconds per beat
let fluteSpeedPct=100; // 100 = normal; higher = faster
function BEAT(){ return BEAT_BASE*(100/fluteSpeedPct); }

function initAudio(){
  if(actx) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0.55; master.connect(actx.destination);
  // cavern-like reverb (a bone flute in stone resonance)
  const conv=actx.createConvolver(); conv.buffer=makeIR(3.4,2.2);
  const wet=actx.createGain(); wet.gain.value=0.42;
  const dry=actx.createGain(); dry.gain.value=0.8;
  conv.connect(wet).connect(master); dry.connect(master);

  airGain=actx.createGain(); airGain.gain.value=0.0; airGain.connect(dry); airGain.connect(conv);
  fluteGain=actx.createGain(); fluteGain.gain.value=0.0; fluteGain.connect(dry); fluteGain.connect(conv);

  startBreath();
  airGain.gain.linearRampToValueAtTime(0.10, actx.currentTime+5);
  fluteGain.gain.linearRampToValueAtTime(0.6, actx.currentTime+3);
  scheduleMelody();
}

function makeIR(dur,decay){
  const rate=actx.sampleRate, len=rate*dur;
  const buf=actx.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);
    for(let i=0;i<len;i++){d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}}
  return buf;
}

/* faint continuous breath/air bed under the flute */
function startBreath(){
  const len=actx.sampleRate*3;
  const nb=actx.createBuffer(1,len,actx.sampleRate);
  const d=nb.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.5;
  const src=actx.createBufferSource(); src.buffer=nb; src.loop=true;
  const bp=actx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1400; bp.Q.value=0.5;
  const g=actx.createGain(); g.gain.value=0.5;
  src.connect(bp); bp.connect(g); g.connect(airGain);
  const lfo=actx.createOscillator(); lfo.type="sine"; lfo.frequency.value=0.16;
  const lg=actx.createGain(); lg.gain.value=0.25; lfo.connect(lg); lg.connect(g.gain);
  src.start(); lfo.start();
}

/* Bone-flute voice: near-sine fundamental + breath noise + a touch
   of pitch instability, soft attack with an airy chiff. */
function fluteNote(freq, dur, when){
  const t=when;
  // fundamental (bone flutes are nearly pure, slight odd-harmonic edge)
  const o=actx.createOscillator(); o.type="sine";
  const o2=actx.createOscillator(); o2.type="triangle"; // faint harmonic colour
  o.frequency.setValueAtTime(freq,t);
  o2.frequency.setValueAtTime(freq,t);
  // micro pitch instability (hand-bored bone pipe isn't perfectly stable)
  o.frequency.linearRampToValueAtTime(freq*1.004,t+dur*0.5);
  o.frequency.linearRampToValueAtTime(freq*0.998,t+dur);
  // gentle breath vibrato, entering after the onset
  const lfo=actx.createOscillator(); lfo.frequency.value=4.6;
  const lfoG=actx.createGain(); lfoG.gain.setValueAtTime(0,t);
  lfoG.gain.linearRampToValueAtTime(freq*0.008,t+0.25);
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=2600; lp.Q.value=0.6;
  const g=actx.createGain();
  const h2=actx.createGain(); h2.gain.value=0.18; // triangle blend level
  // soft breathy envelope
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.6,t+0.09);
  g.gain.setTargetAtTime(0.5,t+0.12,0.3);
  g.gain.setValueAtTime(0.5,Math.max(t+0.12,t+dur-0.18));
  g.gain.linearRampToValueAtTime(0.0001,t+dur);
  o.connect(lp); o2.connect(h2); h2.connect(lp); lp.connect(g); g.connect(fluteGain);
  // breath chiff at the onset
  const cl=actx.sampleRate*0.12|0;
  const cb=actx.createBuffer(1,cl,actx.sampleRate);
  const cd=cb.getChannelData(0);
  for(let i=0;i<cl;i++) cd[i]=(Math.random()*2-1)*Math.pow(1-i/cl,2);
  const cs=actx.createBufferSource(); cs.buffer=cb;
  const cbp=actx.createBiquadFilter(); cbp.type="bandpass"; cbp.frequency.value=freq*2; cbp.Q.value=0.8;
  const cg=actx.createGain(); cg.gain.value=0.12;
  cs.connect(cbp); cbp.connect(cg); cg.connect(fluteGain);
  o.start(t); o2.start(t); lfo.start(t); cs.start(t);
  o.stop(t+dur+0.05); o2.stop(t+dur+0.05); lfo.stop(t+dur+0.05);
}

/* Play the Seikilos melody straight through, then rest and loop. */
function scheduleMelody(){
  if(!actx) return;
  let when=actx.currentTime+0.8;
  function playTune(){
    if(!actx||!audioOn) return;
    let w=when;
    const b=BEAT();
    SEIKILOS.forEach(([nm,beats])=>{
      const f=hz(nm);
      const dur=beats*b;
      fluteNote(f,dur*0.96,w);
      w+=dur;
    });
    w+=b*4; // rest before the melody returns
    when=w;
    const ms=(w-actx.currentTime)*1000 - 1500;
    melodyTimer=setTimeout(()=>{ when=actx.currentTime+0.4; playTune(); }, Math.max(500,ms));
  }
  playTune();
}

/* Restart the melody loop at the new tempo (called when flute slider moves) */
function retempoFlute(){
  if(!actx) return;
  clearTimeout(melodyTimer);
  // briefly duck the flute to mask the transition, then relaunch
  const t=actx.currentTime;
  fluteGain.gain.cancelScheduledValues(t);
  fluteGain.gain.setValueAtTime(fluteGain.gain.value,t);
  fluteGain.gain.linearRampToValueAtTime(0.0001,t+0.25);
  setTimeout(()=>{
    if(!actx) return;
    fluteGain.gain.linearRampToValueAtTime(0.6,actx.currentTime+0.4);
    scheduleMelody();
  },300);
}

let idx=0, playing=false, lineTimer=null, currentMotif=null;
let speedPct=100; // recitation speed: 100 = normal, higher = faster
const lineEl=document.getElementById("poemLine");
const tagEl=document.getElementById("sectionTag");

function showLine(i){
  const item=POEM[i];
  // shatter the line that is currently showing before swapping in the new one
  if(lineEl.classList.contains("show") && lineEl.textContent.trim()){
    shatterLine();
  }
  lineEl.classList.remove("show");
  tagEl.classList.remove("show");
  currentMotif=item.motif;
  // River scene: fade in as the final apple line is recited; otherwise keep it hidden
  // (unless we're in the post-poem 1-minute end hold).
  if(i===POEM.length-1){
    showRiver();
    riverEndLineEl.textContent=item.line;
    void riverEndLineEl.offsetWidth;
    riverEndLineEl.classList.add("show");
  }
  else if(!inEndHold){ hideRiver(); }
  setTimeout(()=>{
    lineEl.textContent=item.line;
    lineEl.className="poemLine"+(item.prose?" prose":"");
    tagEl.textContent="❖ "+item.sec+" ❖";
    void lineEl.offsetWidth;
    lineEl.classList.add("show");
    tagEl.classList.add("show");
    updateDots(item.sec);
    triggerMotif(item.motif);
    revealRegion(item.sec);
  },700);
}

/* ---- Painting interludes: show the artwork 4 times per loop ---- */
const PAINTING_HOLD=6500;   // ms the painting stays fully visible
const PAINTING_FADE=2200;   // matches CSS transition
// 4 evenly-spaced trigger points across the poem (after these line indices)
const PAINT_POINTS=(()=>{
  const n=POEM.length, k=4, pts=[];
  for(let j=1;j<=k;j++){ pts.push(Math.round(j*n/(k+1))); }
  return pts; // e.g. ~[13,27,40,54] for 67 lines
})();
const paintingEl=document.getElementById("painting");
let inInterlude=false;

/* ---- River scene: start image, final-line image, and 1-minute end hold ---- */
const RIVER_HOLD=60000;     // 1 full minute the river scene stays on screen after the poem ends
const RIVER_FADE=2400;      // matches CSS transition
const RIVER_START_HOLD=6000;// how long the river scene shows at the very start before the poem begins
const riverEl=document.getElementById("riverScene");
const riverTitleEl=document.getElementById("riverTitle");
const riverEndLineEl=document.getElementById("riverEndLine");
let endHoldTimer=null;      // the 60s auto-restart timer
let inEndHold=false;        // true while the river scene is held at the end

function showRiver(){ riverEl.classList.add("show"); }
function hideRiver(){ riverEl.classList.remove("show"); riverTitleEl.classList.remove("show"); riverEndLineEl.classList.remove("show"); }
// cancel the end-hold state and any pending auto-restart (used by manual controls)
function cancelEndHold(){
  inEndHold=false;
  if(endHoldTimer){ clearTimeout(endHoldTimer); endHoldTimer=null; }
  hideRiver();
}

function showPainting(after){
  inInterlude=true;
  // hide current line/tag while the painting is up
  lineEl.classList.remove("show");
  tagEl.classList.remove("show");
  paintingEl.classList.add("show");
  setTimeout(()=>{
    paintingEl.classList.remove("show");
    setTimeout(()=>{ inInterlude=false; after && after(); }, PAINTING_FADE);
  }, PAINTING_HOLD);
}

function advance(){
  if(!playing) return;
  const item=POEM[idx];
  const dur=(item.t||5)*1000*(100/speedPct);
  lineTimer=setTimeout(()=>{
    // interlude check: if we've just finished a trigger line, show the painting first
    if(PAINT_POINTS.includes(idx)){
      showPainting(()=>{
        if(!playing) return;
        idx++;
        if(idx>=POEM.length){ loopEnd(); return; }
        showLine(idx); advance();
      });
      return;
    }
    idx++;
    if(idx>=POEM.length){ loopEnd(); return; }
    showLine(idx); advance();
  },dur);
}

function loopEnd(){
  // The poem has ended on the final apple line. The river scene is already
  // fading in (triggered in showLine for the last line). Hold it for 1 full
  // minute, then auto-restart — but not before the minute is up.
  playing=false;
  document.getElementById("playPause").textContent="▶";
  clearTimeout(lineTimer);
  lineEl.classList.remove("show");
  tagEl.classList.remove("show");
  inEndHold=true;
  showRiver(); // ensure it's visible (also shown via final-line trigger)
  // let the final line linger briefly over the river, then fade it away
  setTimeout(()=>{ if(inEndHold) riverEndLineEl.classList.remove("show"); }, 5000);
  endHoldTimer=setTimeout(()=>{
    if(!inEndHold) return;        // a manual restart already happened
    inEndHold=false; endHoldTimer=null;
    hideRiver();
    setTimeout(()=>{ resetMosaic(); idx=0; showLine(0); play(); }, RIVER_FADE);
  }, RIVER_HOLD);
}

function play(){ playing=true; document.getElementById("playPause").textContent="⏸"; advance(); }
function pause(){ playing=false; clearTimeout(lineTimer); document.getElementById("playPause").textContent="▶"; }

const dust=document.getElementById("dust"),dctx=dust.getContext("2d");
const mcv=document.getElementById("motifCanvas"),mctx=mcv.getContext("2d");
const cos=document.getElementById("cosmos"),cctx=cos.getContext("2d");
let stars=[], nebulae=[], galaxy=null;
function resize(){

/* ---- Synthetic intergalactic background ---- */
function initCosmos(){
  const W=cos.width,H=cos.height;
  stars=[];
  const n=Math.round(W*H/5200);
  for(let i=0;i<n;i++) stars.push({
    x:Math.random()*W, y:Math.random()*H,
    r:Math.random()*1.4+0.2, base:Math.random()*0.5+0.3,
    tw:Math.random()*6.28, sp:0.4+Math.random()*1.2,
    drift:0.002+Math.random()*0.01
  });
  // a few slow drifting nebula clouds
  const palette=[[120,80,180],[60,90,180],[180,90,140],[80,140,170]];
  nebulae=[];
  for(let i=0;i<5;i++){
    const c=palette[i%palette.length];
    nebulae.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.max(W,H)*(0.22+Math.random()*0.3),
      c, a:0.05+Math.random()*0.06,
      vx:(Math.random()-0.5)*0.06, vy:(Math.random()-0.5)*0.04,
      ph:Math.random()*6.28, pulse:0.0004+Math.random()*0.0006
    });
  }
  // one faint spiral galaxy drifting slowly
  galaxy={ x:W*(0.2+Math.random()*0.6), y:H*(0.2+Math.random()*0.6),
    r:Math.min(W,H)*0.26, rot:Math.random()*6.28,
    vx:(Math.random()-0.5)*0.04, vy:(Math.random()-0.5)*0.03, spin:0.00006 };
}
function drawCosmos(ts){
  const W=cos.width,H=cos.height;
  cctx.clearRect(0,0,W,H);
  // nebulae (additive glow)
  cctx.globalCompositeOperation="lighter";
  for(const nb of nebulae){
    nb.x+=nb.vx; nb.y+=nb.vy; nb.ph+=nb.pulse;
    if(nb.x<-nb.r)nb.x=W+nb.r; if(nb.x>W+nb.r)nb.x=-nb.r;
    if(nb.y<-nb.r)nb.y=H+nb.r; if(nb.y>H+nb.r)nb.y=-nb.r;
    const a=nb.a*(0.7+0.3*Math.sin(nb.ph));
    const g=cctx.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,nb.r);
    g.addColorStop(0,`rgba(${nb.c[0]},${nb.c[1]},${nb.c[2]},${a})`);
    g.addColorStop(1,`rgba(${nb.c[0]},${nb.c[1]},${nb.c[2]},0)`);
    cctx.fillStyle=g; cctx.beginPath(); cctx.arc(nb.x,nb.y,nb.r,0,6.28); cctx.fill();
  }
  // galaxy — faint spiral of dust + core
  if(galaxy){
    const gx=galaxy; gx.x+=gx.vx; gx.y+=gx.vy; gx.rot+=gx.spin;
    if(gx.x<-gx.r)gx.x=W+gx.r; if(gx.x>W+gx.r)gx.x=-gx.r;
    if(gx.y<-gx.r)gx.y=H+gx.r; if(gx.y>H+gx.r)gx.y=-gx.r;
    cctx.save(); cctx.translate(gx.x,gx.y); cctx.rotate(gx.rot);
    for(let arm=0;arm<2;arm++){
      cctx.rotate(Math.PI);
      for(let i=0;i<90;i++){
        const ang=i*0.22, rad=(i/90)*gx.r;
        const px=Math.cos(ang)*rad, py=Math.sin(ang)*rad*0.55;
        const a=0.10*(1-i/90);
        cctx.fillStyle=`rgba(200,190,235,${a})`;
        cctx.beginPath(); cctx.arc(px,py,1.4*(1-i/120),0,6.28); cctx.fill();
      }
    }
    const cg=cctx.createRadialGradient(0,0,0,0,0,gx.r*0.3);
    cg.addColorStop(0,"rgba(245,240,255,0.22)");
    cg.addColorStop(1,"rgba(245,240,255,0)");
    cctx.fillStyle=cg; cctx.beginPath(); cctx.arc(0,0,gx.r*0.3,0,6.28); cctx.fill();
    cctx.restore();
  }
  // stars (twinkling, slow drift)
  for(const s of stars){
    s.tw+=0.02*s.sp; s.x+=s.drift;
    if(s.x>W) s.x=0;
    const a=s.base*(0.55+0.45*Math.sin(s.tw));
    cctx.fillStyle=`rgba(244,240,225,${a})`;
    cctx.beginPath(); cctx.arc(s.x,s.y,s.r,0,6.28); cctx.fill();
  }
  cctx.globalCompositeOperation="source-over";
}

// floating dust / fireflies
let motes=[];
function initMotes(){motes=[];for(let i=0;i<70;i++)motes.push({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,

// river SVG waves
const river=document.getElementById("river");
function buildRiver(){
  let html="";
  const cols=["#2c4a72","#3a6298","#4a7bb0","#c9a14a"];
  for(let l=0;l<4;l++){
    html+=`<path class="rv" data-l="${l}" fill="${cols[l]}" opacity="${0.30-l*0.05}"/>`;
  }
  river.innerHTML=html;
}
buildRiver();
const rvPaths=[...river.querySelectorAll(".rv")];
function riverFrame(t){
  rvPaths.forEach((p,l)=>{
    const baseY=120+l*55, amp=18+l*9, sp=0.0006+l*0.0003;
    let d=`M0,${baseY}`;
    for(let x=0;x<=1440;x+=40){
      const y=baseY+Math.sin(x*0.008+t*sp+l)*amp;
      d+=` L${x},${y}`;
    }
    d+=` L1440,400 L0,400 Z`;
    p.setAttribute("d",d);
  });
}

/* ---- Motif particle systems ---- */
let motifParticles=[];
function triggerMotif(type){
  // spawn a burst themed to the motif
  const cx=innerWidth/2, cy=innerHeight*0.42;
  const make=(o)=>motifParticles.push(Object.assign({life:0,max:o.max||520},o));
  if(type==="cloud"){
    for(let i=0;i<6;i++) make({type:"cloud",x:Math.random()*innerWidth,y:innerHeight*0.16+Math.random()*innerHeight*0.28,
      vx:0.12+Math.random()*0.22,s:110+Math.random()*120,max:1000});
  } else if(type==="language"||type==="word"){
    const glyphs="অআকতমনলসবযৎঋ৺".split("");
    for(let i=0;i<16;i++) make({type:"glyph",ch:glyphs[i%glyphs.length],
      x:cx+(Math.random()-0.5)*innerWidth*0.82,y:cy+(Math.random()-0.5)*innerHeight*0.6,
      vy:-0.18-Math.random()*0.28,sz:34+Math.random()*26,max:760});
  } else if(type==="river"){
    for(let i=0;i<12;i++) make({type:"ripple",x:Math.random()*innerWidth,y:innerHeight*0.66+Math.random()*innerHeight*0.26,
      r:6,max:680});
  } else if(type==="evolution"){
    const chain=["🌿","🐟","🐸","🐍","🕊"];
    const rowY=innerHeight*0.78; // below the poem line
    for(let i=0;i<5;i++) make({type:"evo",ch:chain[i],x:innerWidth*(0.2+i*0.15),y:rowY,
      delay:i*90,max:920});
  } else if(type==="apple"){
    for(let i=0;i<12;i++) make({type:"petal",x:cx+(Math.random()-0.5)*innerWidth*0.5,y:cy-150+Math.random()*80,
      vy:0.28+Math.random()*0.4,vx:(Math.random()-0.5)*0.5,rot:Math.random()*6.28,sz:1.5+Math.random()*0.8,max:900});
  }
}

function drawMotifs(t){
  mctx.clearRect(0,0,mcv.width,mcv.height);
  motifParticles=motifParticles.filter(p=>p.life<p.max);
  for(const p of motifParticles){
    p.life++;
    const prog=p.life/p.max;
    let alpha = prog<0.15? prog/0.15 : prog>0.7? (1-prog)/0.3 : 1;
    alpha=Math.max(0,Math.min(1,alpha));
    mctx.save();
    mctx.globalAlpha=alpha*0.9;
    if(p.type==="cloud"){
      p.x+=p.vx;
      const g=mctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.s);
      g.addColorStop(0,"rgba(227,201,127,0.22)");g.addColorStop(1,"rgba(227,201,127,0)");
      mctx.fillStyle=g;mctx.beginPath();mctx.arc(p.x,p.y,p.s,0,6.28);mctx.fill();
    } else if(p.type==="glyph"){
      p.y+=p.vy;
      mctx.globalAlpha=alpha*0.7;
      mctx.fillStyle="#e3c97f";
      mctx.shadowColor="rgba(227,201,127,0.6)";mctx.shadowBlur=18;
      mctx.font=`${(p.sz||32)+Math.sin(p.life*0.05)*5}px "Tiro Bangla",serif`;
      mctx.textAlign="center";mctx.fillText(p.ch,p.x,p.y);
      mctx.shadowBlur=0;
    } else if(p.type==="ripple"){
      p.r+=1.1;
      mctx.strokeStyle="rgba(120,180,230,"+(alpha*0.55)+")";mctx.lineWidth=2;
      mctx.beginPath();mctx.ellipse(p.x,p.y,p.r,p.r*0.4,0,0,6.28);mctx.stroke();
    } else if(p.type==="evo"){
      if(p.life<p.delay){mctx.restore();continue;}
      const lp=(p.life-p.delay)/(p.max-p.delay);
      let la=lp<0.2?lp/0.2:lp>0.7?(1-lp)/0.3:1;
      mctx.globalAlpha=Math.max(0,la);
      mctx.font="72px serif";mctx.textAlign="center";
      mctx.fillText(p.ch,p.x,p.y+Math.sin(p.life*0.03)*6);
    } else if(p.type==="petal"){
      p.y+=p.vy;p.x+=p.vx;p.rot+=0.02;
      const sc=p.sz||1;
      mctx.translate(p.x,p.y);mctx.rotate(p.rot);
      mctx.fillStyle="rgba(217,138,138,"+(alpha*0.75)+")";
      mctx.beginPath();mctx.ellipse(0,0,11*sc,5*sc,0,0,6.28);mctx.fill();
    }
    mctx.restore();
  }
}

function drawDust(t){
  dctx.clearRect(0,0,dust.width,dust.height);
  for(const m of motes){
    m.y-=m.sp; if(m.y<-5){m.y=innerHeight+5;m.x=Math.random()*innerWidth;}
    const tw=0.5+0.5*Math.sin(t*0.002+m.ph);
    dctx.beginPath();
    dctx.fillStyle="rgba(244,236,216,"+(m.a*tw*0.7)+")";
    dctx.arc(m.x,m.y,m.r,0,6.28);dctx.fill();
  }
}

function frame(ts){
  drawCosmos(ts);
  drawDust(ts);
  riverFrame(ts);
  drawMotifs(ts);
  drawShards();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

  initAudio();
  const tl=document.getElementById("title");
  tl.style.opacity="0";setTimeout(()=>tl.style.display="none",2000);
  document.getElementById("controls").classList.add("show");
  document.getElementById("dots").classList.add("show");
  // Show the river scene at the very start (the whole image + title), hold briefly,
  // then it dissolves and the painting reassembles piece by piece across the poem.
  resetMosaic();
  showRiver();
  void riverTitleEl.offsetWidth;
  riverTitleEl.classList.add("show");
  setTimeout(()=>{
    hideRiver();
    setTimeout(()=>{ resetMosaic(); idx=0; showLine(0); play(); }, RIVER_FADE);
  }, RIVER_START_HOLD);
});
document.getElementById("playPause").addEventListener("click",()=>{
  if(inEndHold){ cancelEndHold(); idx=0; showLine(0); play(); return; }
  playing?pause():play();
});
document.getElementById("gear").addEventListener("click",()=>{ document.getElementById("controls").classList.toggle("open"); });
document.getElementById("next").addEventListener("click",()=>{
  cancelEndHold();
  clearTimeout(lineTimer); idx=Math.min(POEM.length-1,idx+1); showLine(idx); if(playing)advance();
});
document.getElementById("prev").addEventListener("click",()=>{
  cancelEndHold();
  clearTimeout(lineTimer); idx=Math.max(0,idx-1); showLine(idx); if(playing)advance();
});
document.getElementById("restart").addEventListener("click",()=>{
  cancelEndHold();
  clearTimeout(lineTimer); idx=0; showLine(0); if(!playing)play(); else advance();
});
document.getElementById("mute").addEventListener("click",(e)=>{
  muted=!muted;
  if(master) master.gain.linearRampToValueAtTime(muted?0:(document.getElementById("vol").value/100),actx.currentTime+0.3);
  e.target.textContent=muted?"🔇":"🔊";
});
document.getElementById("vol").addEventListener("input",(e)=>{
  if(master&&!muted) master.gain.value=e.target.value/100;
});
document.getElementById("spd").addEventListener("input",(e)=>{
  speedPct=parseInt(e.target.value,10);
  // re-time the current line immediately so the change feels responsive
  if(playing){ clearTimeout(lineTimer); advance(); }
});
let fspdDebounce=null;
document.getElementById("fspd").addEventListener("input",(e)=>{
  fluteSpeedPct=parseInt(e.target.value,10);
  clearTimeout(fspdDebounce);
  fspdDebounce=setTimeout(()=>{ if(actx) retempoFlute(); },280);
});

/* keyboard */
addEventListener("keydown",e=>{
  if(e.code==="Space"){e.preventDefault();playing?pause():play();}
  if(e.code==="ArrowRight")document.getElementById("next").click();
  if(e.code==="ArrowLeft")document.getElementById("prev").click();
});
</script>
</body>
</html>
