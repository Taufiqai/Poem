<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আকাশে মেঘ, হৃদয়ে রং — অতিথি রজনী ও সাংস্কৃতিক সন্ধ্যা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#16301f; --moss:#2d5a3d; --leaf:#5a8f4a; --wet-leaf:#8fcb5a;
    --gold:#e3c97f; --gold-deep:#c9a14a; --cream:#f4ecd8;
    --ink:#0b1a10;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    font-family:"Hind Siliguri","Tiro Bangla",sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #20422b 0%, transparent 60%),
      linear-gradient(180deg,#0e2417 0%, #16301f 45%, #0b1a10 100%);
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
  }

  /* ---------- HERO ---------- */
  .hero{position:relative;width:100%;max-width:1411px;margin:0 auto;
    aspect-ratio:1411/752;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.55);}
  .hero-img{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;z-index:1;}

  /* soft foliage backing that masks the original magenta title */
  .title-cover{position:absolute;z-index:2;
    left:12%;top:9.5%;width:76%;height:25%;
    background-image:var(--backing);background-size:cover;background-position:center;
    filter:blur(2px) brightness(.82) saturate(1.1);
    -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, #000 60%, transparent 100%);
    mask-image:radial-gradient(ellipse 70% 70% at 50% 50%, #000 60%, transparent 100%);}

  /* logo moved to the TOP CENTER */
  .logo-top{position:absolute;z-index:5;
    left:50%;top:2.5%;transform:translateX(-50%);
    width:12%;aspect-ratio:1/1;border-radius:50%;
    background-image:var(--logo);background-size:cover;background-position:center;
    border:3px solid rgba(227,201,127,.9);
    box-shadow:0 6px 22px rgba(0,0,0,.5), 0 0 26px rgba(143,203,90,.45);
    background-color:#eef3ee;}

  /* new LUSH GREEN title over the cleared band */
  .new-title{position:absolute;z-index:6;
    left:50%;top:15.5%;transform:translateX(-50%);
    width:92%;text-align:center;
    font-family:"Tiro Bangla",serif;font-weight:700;
    font-size:clamp(28px,6.2vw,86px);line-height:1.04;letter-spacing:.01em;
    /* lush wet-foliage gradient fill */
    background:linear-gradient(170deg,#bfe88a 0%, #6fae3e 30%, #2f6a2c 62%, #17401b 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    /* leafy depth + a dewy highlight */
    text-shadow:
      0 1px 0 rgba(255,255,255,.25),
      0 2px 6px rgba(0,0,0,.45),
      0 0 26px rgba(120,180,70,.35);
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));}
  /* faint dewy top-light streak on the title */
  .new-title::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(255,255,255,.35) 0%, transparent 38%);
    -webkit-background-clip:text;background-clip:text;
    mix-blend-mode:screen;pointer-events:none;}

  /* rain overlay across the hero */
  .rain{position:absolute;inset:0;z-index:4;pointer-events:none;opacity:.5;}

  /* ---------- AUDIO + DASHBOARD CONTROLS BAR ---------- */
  .bar{position:relative;z-index:7;max-width:1411px;margin:0 auto;
    display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:center;
    padding:22px 18px;}
  .btn{font-family:"Hind Siliguri",sans-serif;cursor:pointer;border:none;
    display:inline-flex;align-items:center;gap:10px;
    padding:14px 24px;border-radius:999px;font-size:clamp(15px,1.6vw,18px);font-weight:600;
    transition:transform .2s ease, box-shadow .3s ease, background .3s ease;}
  .btn:hover{transform:translateY(-2px);}
  .btn-audio{background:rgba(143,203,90,.14);color:var(--cream);
    border:1px solid rgba(143,203,90,.5);}
  .btn-audio:hover{background:rgba(143,203,90,.24);}
  .btn-portal{
    background:linear-gradient(135deg,#3a7a36,#1d4a22);
    color:var(--cream);text-decoration:none;
    border:1px solid rgba(227,201,127,.6);
    box-shadow:0 8px 26px rgba(0,0,0,.45), 0 0 22px rgba(143,203,90,.3);}
  .btn-portal:hover{box-shadow:0 12px 34px rgba(0,0,0,.5), 0 0 32px rgba(143,203,90,.55);}
  .btn-portal .arrow{transition:transform .25s ease;}
  .btn-portal:hover .arrow{transform:translateX(4px);}
  .vol{display:flex;align-items:center;gap:8px;color:#bcd3b3;font-size:14px;}
  .vol input{width:90px;accent-color:var(--wet-leaf);}

  /* ---------- DETAILS ---------- */
  .details{max-width:900px;margin:8px auto 40px;padding:0 22px;text-align:center;}
  .eyebrow{font-family:"Tiro Bangla",serif;color:var(--gold);
    font-size:clamp(18px,2.6vw,28px);font-weight:600;margin-bottom:6px;}
  .course{color:#cfe3c4;font-size:clamp(15px,2vw,20px);font-style:italic;margin-bottom:22px;}
  .card{display:inline-block;text-align:left;
    background:rgba(13,28,18,.55);backdrop-filter:blur(8px);
    border:1px solid rgba(143,203,90,.22);border-radius:18px;
    padding:22px 30px;margin-top:6px;
    box-shadow:0 16px 40px rgba(0,0,0,.4);}
  .row{display:flex;gap:12px;padding:9px 0;align-items:baseline;
    border-bottom:1px dashed rgba(143,203,90,.18);}
  .row:last-child{border-bottom:none;}
  .row .k{color:var(--gold-deep);font-weight:600;min-width:96px;font-size:15px;}
  .row .v{color:var(--cream);font-size:clamp(15px,1.9vw,18px);}
  .row .v b{color:#fff;}

  .footer-note{text-align:center;color:#7f9a78;font-size:13px;
    padding:14px 18px 40px;line-height:1.7;
    display:flex;flex-direction:column;align-items:center;gap:10px;}
  .link-hint{color:#6f8a68;font-size:12px;letter-spacing:.02em;}

  @media (max-width:560px){
    .logo-top{width:18%;top:2%;}
    .new-title{top:18%;}
    .card{padding:18px 18px;}
    .row{flex-direction:column;gap:2px;}
    .row .k{min-width:0;}
  }
  @media (prefers-reduced-motion:reduce){
    .rain{display:none;}
    .btn{transition:none;}
  }
</style>
</head>
<body>

  <section class="hero">
    <img class="hero-img" id="heroImg" alt="আকাশে মেঘ, হৃদয়ে রং — বৃষ্টিভেজা অরণ্যের ব্যানার">
    <div class="logo-top" id="logoTop" title="BPATC"></div>
    <div class="new-title">আকাশে মেঘ,<br>হৃদয়ে রং</div>
    <canvas class="rain" id="rain"></canvas>
  </section>

  <div class="bar">
    <button class="btn btn-audio" id="audioBtn">
      <span id="audioIcon">🎵</span> <span id="audioLabel">সেতার ও বৃষ্টির সুর শুনুন</span>
    </button>
    <span class="vol">
      <span>🔊</span><input type="range" id="vol" min="0" max="100" value="60">
    </span>
  </div>

  <div class="details">
    <div class="eyebrow">অতিথি রজনী ও সাংস্কৃতিক সন্ধ্যা</div>
    <div class="course">১২৩তম সিনিয়র স্টাফ কোর্স</div>
    <div class="card">
      <div class="row"><span class="k">প্রধান অতিথি</span>
        <span class="v"><b>জনাব সাঈদ মাহবুব খান</b> — রেক্টর, বিপিএটিসি</span></div>
      <div class="row"><span class="k">স্থান</span>
        <span class="v">অডিটোরিয়াম, বিপিএটিসি</span></div>
      <div class="row"><span class="k">তারিখ</span>
        <span class="v">১৫ আষাঢ় ১৪৩৩ &nbsp;/&nbsp; ২৯ জুন, ২০২৬</span></div>
    </div>
  </div>

  <div class="footer-note">
    <a class="btn btn-portal" href="adyanta-dashboard.html" target="_blank" rel="noopener">
      কবিতা 'আদ্যন্ত' — আলাদা পাতায় দেখুন <span class="arrow">→</span>
    </a>
    <div class="link-hint">একটি পৃথক উপস্থাপনা · নতুন পাতায় খুলবে</div>
  </div>

let actx=null, master=null, rainGain=null, sitarGain=null, droneGain=null;

// Raga Megh / Malhar feel (the "rain raga"): a soft pentatonic-ish set.
// Sa Re ma Pa ni  — relative to a tonic. Tonic Sa = C4 (261.63 Hz).
function ragaHz(deg){
  // semitone offsets from Sa for the notes we use (Megh: S R m P n)
  const Sa=261.63;
  const map={ "Sa":0, "Re":2, "ma":5, "Pa":7, "ni":10, "Sa+":12, "Re+":14, "ni-":-2, "Pa-":-5 };
  return Sa*Math.pow(2, map[deg]/12);
}

  ["Sa",1.2],["Re",0.6],["ma",1.0],["Pa",1.4],["ma",0.6],["Re",0.8],
  ["Pa",1.0],["ni",0.8],["Sa+",1.6],["ni",0.7],["Pa",1.0],["ma",1.2],
  ["Re",0.8],["Sa",1.8],["Pa-",1.0],["Sa",2.0]
];

function initAudio(){
  if(actx) return;
  actx=new (window.AudioContext||window.webkitAudioContext)();
  master=actx.createGain(); master.gain.value=0.6; master.connect(actx.destination);

  // hall reverb for the sitar
  const conv=actx.createConvolver(); conv.buffer=makeIR(2.8,2.4);
  const wet=actx.createGain(); wet.gain.value=0.32;
  const dry=actx.createGain(); dry.gain.value=0.85;
  conv.connect(wet).connect(master); dry.connect(master);

  sitarGain=actx.createGain(); sitarGain.gain.value=0.0; sitarGain.connect(dry); sitarGain.connect(conv);
  droneGain=actx.createGain(); droneGain.gain.value=0.0; droneGain.connect(dry); droneGain.connect(conv);
  rainGain =actx.createGain(); rainGain.gain.value =0.0; rainGain.connect(master);

  startDrone();    // tanpura-like Sa–Pa drone
  startRain();     // monsoon rain bed
  scheduleSitar();

  // fade everything in
  const t=actx.currentTime;
  droneGain.gain.linearRampToValueAtTime(0.18, t+4);
  sitarGain.gain.linearRampToValueAtTime(0.55, t+3);
  rainGain.gain.linearRampToValueAtTime(0.45, t+3);
}

function makeIR(dur,decay){
  const rate=actx.sampleRate, len=rate*dur;
  const buf=actx.createBuffer(2,len,rate);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}

/* ---- Tanpura-style drone: Sa and Pa, slowly pulsing ---- */
function startDrone(){
  [ragaHz("Sa")/2, ragaHz("Pa")/2, ragaHz("Sa")].forEach((f,i)=>{
    const o=actx.createOscillator(); o.type="sawtooth"; o.frequency.value=f;
    const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=900; lp.Q.value=2;
    const g=actx.createGain(); g.gain.value=0.0;
    // slow shimmering pulse, each string slightly out of phase
    const lfo=actx.createOscillator(); lfo.type="sine"; lfo.frequency.value=0.18+i*0.05;
    const lg=actx.createGain(); lg.gain.value=0.05;
    lfo.connect(lg); lg.connect(g.gain);
    g.gain.setValueAtTime(0.06,actx.currentTime);
    o.connect(lp); lp.connect(g); g.connect(droneGain);
    o.start(); lfo.start();
  });
}

/* ---- Sitar pluck: bright sawtooth + a sympathetic shimmer, with a
   characteristic meend (slide) into some notes and fast decay. ---- */
function sitarPluck(freq, dur, when){
  const t=when;
  const o=actx.createOscillator(); o.type="sawtooth";
  const o2=actx.createOscillator(); o2.type="triangle";
  // slight slide (meend) up into the note
  o.frequency.setValueAtTime(freq*0.94,t);
  o.frequency.exponentialRampToValueAtTime(freq,t+0.12);
  o2.frequency.setValueAtTime(freq*2.001,t);
  const lp=actx.createBiquadFilter(); lp.type="lowpass";
  lp.frequency.setValueAtTime(4200,t);
  lp.frequency.exponentialRampToValueAtTime(900,t+dur);
  lp.Q.value=1.2;
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.5,t+0.012);   // sharp pluck attack
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);  // ringing decay
  const h2=actx.createGain(); h2.gain.value=0.22;
  o.connect(lp); o2.connect(h2); h2.connect(lp); lp.connect(g); g.connect(sitarGain);
  // a faint sympathetic-string shimmer an octave up
  const s=actx.createOscillator(); s.type="sine"; s.frequency.value=freq*2;
  const sg=actx.createGain(); sg.gain.setValueAtTime(0.0001,t);
  sg.gain.exponentialRampToValueAtTime(0.06,t+0.04);
  sg.gain.exponentialRampToValueAtTime(0.0001,t+dur*1.2);
  s.connect(sg); sg.connect(sitarGain);
  o.start(t); o2.start(t); s.start(t);
  const end=t+dur*1.3;
  o.stop(end); o2.stop(end); s.stop(end);
}

function scheduleSitar(){
  if(!actx) return;
  let when=actx.currentTime+1.0;
  const BEAT=0.62;
  function playPhrase(){
    if(!actx||!audioOn) return;
    let w=when;
    PHRASE.forEach(([deg,beats])=>{
      const f=ragaHz(deg);
      const dur=beats*BEAT*1.6;
      sitarPluck(f,dur,w);
      w+=beats*BEAT;
    });
    w+=BEAT*3; // breath before the phrase returns
    when=w;
    const ms=(w-actx.currentTime)*1000-1200;
    melodyTimer=setTimeout(()=>{ when=actx.currentTime+0.3; playPhrase(); }, Math.max(500,ms));
  }
  playPhrase();
}

/* ---- Monsoon rain: filtered white-noise bed + occasional droplets ---- */
function startRain(){
  // continuous rain bed
  const len=actx.sampleRate*4;
  const nb=actx.createBuffer(1,len,actx.sampleRate);
  const d=nb.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
  rainSrc=actx.createBufferSource(); rainSrc.buffer=nb; rainSrc.loop=true;
  const hp=actx.createBiquadFilter(); hp.type="highpass"; hp.frequency.value=600;
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=7000;
  const g=actx.createGain(); g.gain.value=0.5;
  // slow swell of the rain intensity
  const lfo=actx.createOscillator(); lfo.type="sine"; lfo.frequency.value=0.08;
  const lg=actx.createGain(); lg.gain.value=0.12; lfo.connect(lg); lg.connect(g.gain);
  rainSrc.connect(hp); hp.connect(lp); lp.connect(g); g.connect(rainGain);
  rainSrc.start(); lfo.start();
  scheduleDroplet();
}
function scheduleDroplet(){
  if(!actx||!audioOn) { setTimeout(scheduleDroplet,400); return; }
  // a soft resonant "plip" — a quick sine blip through a bandpass
  const t=actx.currentTime+0.02;
  const o=actx.createOscillator(); o.type="sine";
  const f=900+Math.random()*1400;
  o.frequency.setValueAtTime(f,t);
  o.frequency.exponentialRampToValueAtTime(f*0.6,t+0.08);
  const bp=actx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=f; bp.Q.value=6;
  const g=actx.createGain();
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.05+Math.random()*0.05,t+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);
  o.connect(bp); bp.connect(g); g.connect(rainGain);
  o.start(t); o.stop(t+0.16);
  setTimeout(scheduleDroplet, 120+Math.random()*340);
}

/* ---- toggle + volume ---- */
function startAudio(){
  initAudio();
  if(actx.state==="suspended") actx.resume();
  audioOn=true;
  document.getElementById("audioIcon").textContent="⏸";
  document.getElementById("audioLabel").textContent="সুর থামান";
}
function stopAudio(){
  audioOn=false;
  if(actx){
    const t=actx.currentTime;
    sitarGain.gain.linearRampToValueAtTime(0,t+0.6);
    droneGain.gain.linearRampToValueAtTime(0,t+0.6);
    rainGain.gain.linearRampToValueAtTime(0,t+0.6);
    clearTimeout(melodyTimer);
  }
  document.getElementById("audioIcon").textContent="🎵";
  document.getElementById("audioLabel").textContent="সেতার ও বৃষ্টির সুর শুনুন";
}
document.getElementById("audioBtn").addEventListener("click",()=>{
  if(audioOn) stopAudio();
  else {
    if(actx){ // resume after a pause
      audioOn=true;
      const t=actx.currentTime;
      droneGain.gain.linearRampToValueAtTime(0.18,t+1.5);
      sitarGain.gain.linearRampToValueAtTime(0.55,t+1.2);
      rainGain.gain.linearRampToValueAtTime(0.45,t+1.2);
      scheduleSitar();
      document.getElementById("audioIcon").textContent="⏸";
      document.getElementById("audioLabel").textContent="সুর থামান";
    } else startAudio();
  }
});
document.getElementById("vol").addEventListener("input",e=>{
  if(master) master.gain.value=(e.target.value/100)*0.6;
});

/* ============================================================
   RAIN VISUAL — light animated streaks over the hero
   ============================================================ */
const rc=document.getElementById("rain"), rctx=rc.getContext("2d");
let drops=[];
function sizeRain(){
  const hero=document.querySelector(".hero");
  rc.width=hero.clientWidth; rc.height=hero.clientHeight;
  drops=[];
  const n=Math.round(rc.width/7);
  for(let i=0;i<n;i++) drops.push(newDrop());
}
function newDrop(){
  return { x:Math.random()*rc.width, y:Math.random()*rc.height,
    len:8+Math.random()*16, sp:6+Math.random()*8, a:0.08+Math.random()*0.18 };
}
function drawRain(){
  rctx.clearRect(0,0,rc.width,rc.height);
  rctx.lineCap="round";
  for(const d of drops){
    rctx.strokeStyle="rgba(220,235,225,"+d.a+")";
    rctx.lineWidth=1.1;
    rctx.beginPath();
    rctx.moveTo(d.x,d.y);
    rctx.lineTo(d.x-1.5,d.y+d.len);
    rctx.stroke();
    d.y+=d.sp; d.x-=0.4;
    if(d.y>rc.height){ Object.assign(d,newDrop()); d.y=-d.len; }
  }
  requestAnimationFrame(drawRain);
}
window.addEventListener("resize",sizeRain);
window.addEventListener("load",()=>{ sizeRain(); drawRain(); });
sizeRain(); drawRain();
</script>
